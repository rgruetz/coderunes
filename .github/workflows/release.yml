name: Release

on:
  push:
    branches: [main]

# Only one release flow at a time so concurrent merges can't race the
# Version Packages PR or double-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest

    permissions:
      contents: write # to push the Version Packages PR commit and tags
      pull-requests: write # to open / update the Version Packages PR
      id-token: write # for npm provenance attestations

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed so changesets can compute the changelog
          # against previous tags.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release Pull Request or publish
        uses: changesets/action@v1
        with:
          # When changesets are present and no Version PR exists, opens one.
          # When the Version PR is merged (which removes the changesets and
          # bumps the version), this same step instead runs the publish
          # script to push to npm.
          version: npm run version
          publish: npm run release
          # Tag and create a GitHub Release on each successful npm publish,
          # using the changelog body as the release notes.
          createGithubReleases: true
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
